name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: firebase-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production site
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://joseph-baby-registry.web.app

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ vars.FIREBASE_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Deploy Firebase Hosting
        run: >-
          npx --yes firebase-tools@15.24.0 deploy
          --only hosting
          --project "${{ vars.FIREBASE_PROJECT_ID }}"
          --non-interactive
          --message "GitHub ${GITHUB_SHA}"

      - name: Verify deployed files
        shell: bash
        run: |
          set -euo pipefail
          readonly site_url="https://joseph-baby-registry.web.app"
          verify_dir="$(mktemp -d)"
          readonly verify_dir
          trap 'rm -rf "${verify_dir}"' EXIT

          files=(
            "index.html"
            "support.js"
            "image-slot.js"
            "assets/joseph-illustration.png"
          )

          for file in "${files[@]}"; do
            expected="$(sha256sum "${file}" | awk '{print $1}')"
            verified=false

            for attempt in {1..10}; do
              echo "Verifying ${file} (attempt ${attempt}/10)..."
              if curl --fail --silent --show-error --location \
                "${site_url}/${file}?commit=${GITHUB_SHA}" \
                --output "${verify_dir}/remote-file"; then
                actual="$(sha256sum "${verify_dir}/remote-file" | awk '{print $1}')"
                if [[ "${actual}" == "${expected}" ]]; then
                  verified=true
                  break
                fi
              fi
              sleep 2
            done

            if [[ "${verified}" != "true" ]]; then
              echo "Checksum verification failed for ${file}" >&2
              exit 1
            fi
          done

          echo "Firebase Hosting matches commit ${GITHUB_SHA}."
